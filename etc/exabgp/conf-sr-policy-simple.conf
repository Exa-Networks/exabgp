# ==============================================================================
# ExaBGP SR-Policy - Simple Example
# ==============================================================================
# Minimal working example for announcing SR-Policy routes
#
# This configuration announces two SR-Policy routes:
#   1. IPv4 SR-Policy with MPLS segments
#   2. IPv6 SR-Policy with SRv6 segments
# ==============================================================================

neighbor 192.0.2.100 {
	router-id 10.0.0.1;
	local-address 192.0.2.1;
	local-as 65000;
	peer-as 65100;

	# Enable SR-Policy address families
	family {
		ipv4 sr-policy;
		ipv6 sr-policy;
	}

	announce {
		ipv4 {
			# Simple MPLS SR-Policy
			# Color 100, Endpoint 10.1.1.1, Path: labels 16001 → 16002
			sr-policy distinguisher 0 color 100 endpoint 10.1.1.1 \
				next-hop 192.0.2.1 \
				preference 100 \
				binding-sid mpls 24000 \
				segment-list weight 1 segment type-a mpls 16001 segment type-a mpls 16002;
		}

		ipv6 {
			# Simple SRv6 SR-Policy
			# Color 100, Endpoint 2001:db8::1, Path: SRv6 SID fc00:0:1::1
			sr-policy distinguisher 0 color 100 endpoint 2001:db8::1 \
				next-hop 2001:db8:ffff::1 \
				preference 100 \
				srv6-binding-sid fc00:0:100::1 \
				segment-list weight 1 segment type-b srv6 fc00:0:1::1;
		}
	}
}

# ==============================================================================
# Quick Reference:
# ==============================================================================
#
# SR-Policy NLRI components:
#   - distinguisher: Unique identifier (usually 0)
#   - color: Policy selector (32-bit integer)
#   - endpoint: Destination IP address
#
# Tunnel Encapsulation Attribute TLVs:
#   - preference: Policy preference (higher = better)
#   - binding-sid mpls: MPLS label representing the policy
#   - srv6-binding-sid: IPv6 address representing the policy
#   - segment-list: Explicit path as sequence of labels/SIDs
#     * weight: Relative weight for load balancing
#     * segment type-a mpls: MPLS label segment
#     * segment type-b srv6: SRv6 SID segment
#
# Run with:
#   exabgp conf-sr-policy-simple.conf
#
# ==============================================================================
