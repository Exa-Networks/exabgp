# ==============================================================================
# ExaBGP SR-Policy (SAFI 73) Configuration Example
# ==============================================================================
# This example demonstrates how to announce SR-Policy routes using ExaBGP.
#
# SR-Policy enables source-based routing by encoding the path as a list of
# segments (MPLS labels or SRv6 SIDs) that packets should traverse.
#
# References:
#   - RFC 9256: Segment Routing Policy Architecture
#   - RFC 9012: The BGP Tunnel Encapsulation Attribute
#
# Key Concepts:
#   - Color: 32-bit value used to map traffic to policies
#   - Endpoint: Destination prefix (IPv4 or IPv6)
#   - Distinguisher: 32-bit value to differentiate policies with same color/endpoint
#   - Binding SID: Label/SID that represents the entire SR-Policy
#   - Segment List: Ordered list of segments (labels or SIDs) defining the path
# ==============================================================================

neighbor 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 65533;
	peer-as 65533;

	# Enable SR-Policy address families
	family {
		ipv4 sr-policy;
		ipv6 sr-policy;
	}

	announce {
		ipv4 {
			# IPv4 SR Policy: MPLS preference + binding-sid + segment type-A (label 16001)
			sr-policy distinguisher 0 color 100 endpoint 10.0.0.1 \
				next-hop 192.0.2.1 \
				preference 100 \
				binding-sid mpls 24000 \
				segment-list weight 1 segment type-a mpls 16001;

			# IPv4 SR Policy: SRv6 binding-sid + type-B segment with endpoint-behavior + names
			sr-policy distinguisher 1 color 200 endpoint 10.0.0.2 \
				next-hop 192.0.2.1 \
				preference 200 \
				srv6-binding-sid fc00::1 \
				segment-list weight 2 segment type-b srv6 fc00::1 endpoint-behavior 65 32 0 16 0 \
				policy-name "my-policy" \
				candidate-path-name "primary";

			# IPv4 SR Policy: multiple segment lists
			sr-policy distinguisher 0 color 300 endpoint 10.0.0.3 \
				next-hop 192.0.2.1 \
				preference 300 \
				segment-list weight 1 segment type-a mpls 16001 \
				segment-list weight 2 segment type-a mpls 16002;
		}

		ipv6 {
			# IPv6 SR Policy: SRv6 segment type-B
			sr-policy distinguisher 0 color 100 endpoint 2001:db8::1 \
				next-hop 2001:db8::2 \
				preference 100 \
				segment-list weight 1 segment type-b srv6 2001:db8:1::1;
		}
	}
}

# ==============================================================================
# Configuration Notes:
# ==============================================================================
#
# SYNTAX FORMAT:
#   sr-policy distinguisher <N> color <N> endpoint <IP> \
#       next-hop <IP> \
#       preference <N> \
#       [priority <N>] \
#       [binding-sid mpls <label>] \
#       [srv6-binding-sid <IPv6>] \
#       [policy-name "<string>"] \
#       [candidate-path-name "<string>"] \
#       segment-list weight <N> \
#           segment type-a mpls <label> [segment type-a mpls <label> ...] \
#       [segment-list weight <N> ...]
#
# Or for SRv6:
#       segment-list weight <N> \
#           segment type-b srv6 <SID> [endpoint-behavior <args>] \
#           [segment type-b srv6 <SID> ...]
#
# 1. DISTINGUISHER:
#    - Usually 0 unless you need multiple policies with same color/endpoint
#    - Increment when advertising multiple candidate paths
#
# 2. COLOR:
#    - Traffic is mapped to policies using color (typically via BGP communities)
#    - Common practice: use color ranges for different service classes
#      * 100-199: Low latency
#      * 200-299: High bandwidth
#      * 300-399: Best effort
#
# 3. NEXT-HOP:
#    - Must be reachable by the receiving router
#    - Typically the router's interface address or a /32 loopback
#
# 4. PREFERENCE:
#    - Higher value = higher preference
#    - Used when multiple candidate paths exist for same policy
#
# 5. PRIORITY (optional):
#    - Used for path protection scenarios
#    - Lower value = higher priority
#
# 6. BINDING-SID vs SRV6-BINDING-SID:
#    - binding-sid mpls: MPLS label (20-1048575)
#    - srv6-binding-sid: IPv6 address
#
# 7. SEGMENT TYPES:
#    - type-a mpls: MPLS label segments
#      Each segment must be declared separately: segment type-a mpls <label>
#    - type-b srv6: SRv6 SID segments with optional endpoint behavior
#      Each segment must be declared separately: segment type-b srv6 <SID>
#
# 8. WEIGHT:
#    - Relative weight for load balancing across segment lists
#    - Traffic distribution proportional to weight values
#
# 9. ENDPOINT BEHAVIOR (SRv6):
#    Format: endpoint-behavior <behavior> <lb-len> <ln-len> <fun-len> <arg-len>
#    - behavior: Endpoint behavior code (e.g., 65 = uSID)
#    - lb-length: Locator Block length in bits
#    - ln-length: Locator Node length in bits
#    - fun-length: Function length in bits
#    - arg-length: Argument length in bits
#
# 10. LINE CONTINUATION:
#    Use backslash (\) at end of line to continue on next line
#
# ==============================================================================
# Running ExaBGP with this configuration:
# ==============================================================================
#
#   exabgp conf-sr-policy.conf
#
# Or with environment variables:
#
#   env exabgp_daemon_daemonize=false \
#       exabgp_log_enable=true \
#       exabgp_log_level=INFO \
#       exabgp conf-sr-policy.conf
#
# ==============================================================================
