# ==============================================================================
# ExaBGP SR-Policy - Static Section Examples (inline syntax)
# ==============================================================================
# This file demonstrates SR-Policy routes configured in the static { } section
# using the inline (single-line) syntax.
#
# Note: The static section uses the same inline syntax as the announce section.
# Multiple segment-lists are separated by the 'segment-list' keyword.
# ==============================================================================

neighbor 192.0.2.100 {
	router-id 10.0.0.1;
	local-address 192.0.2.1;
	local-as 65000;
	peer-as 65100;

	# Enable SR-Policy address families
	family {
		ipv4 sr-policy;
		ipv6 sr-policy;
	}

	static {
		# Example 1: Basic MPLS SR-Policy
		sr-policy distinguisher 0 color 100 endpoint 10.1.1.1 next-hop 192.0.2.1 preference 100 binding-sid mpls 24000 segment-list weight 1 segment type-a mpls 16001;

		# Example 2: MPLS SR-Policy with multiple segments
		sr-policy distinguisher 0 color 200 endpoint 10.2.2.2 next-hop 192.0.2.1 preference 100 binding-sid mpls 24001 segment-list weight 1 segment type-a mpls 16001 segment type-a mpls 16002 segment type-a mpls 16003;

		# Example 3: SR-Policy with multiple segment lists (ECMP)
		sr-policy distinguisher 0 color 300 endpoint 10.3.3.3 next-hop 192.0.2.1 preference 100 priority 10 binding-sid mpls 24002 segment-list weight 10 segment type-a mpls 16001 segment type-a mpls 16002 segment-list weight 5 segment type-a mpls 17001 segment type-a mpls 17002;

		# Example 4: SRv6 SR-Policy with Endpoint Behavior
		sr-policy distinguisher 0 color 400 endpoint 10.4.4.4 next-hop 192.0.2.1 preference 200 srv6-binding-sid fc00::1 segment-list weight 1 segment type-b srv6 fc00::100 endpoint-behavior 65 32 0 16 0 segment type-b srv6 fc00::200 endpoint-behavior 65 32 0 16 0 policy-name "srv6-policy" candidate-path-name "primary";

		# Example 5: IPv6 SR-Policy
		sr-policy distinguisher 0 color 500 endpoint 2001:db8::1 next-hop 2001:db8::ffff preference 100 segment-list weight 1 segment type-b srv6 fc00::a segment type-b srv6 fc00::b;
	}
}
