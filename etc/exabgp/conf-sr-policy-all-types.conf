# ==============================================================================
# ExaBGP SR-Policy - All Segment Types (C through K)
# ==============================================================================
# This file demonstrates all supported SR-Policy segment types per RFC 9831.
# For basic Type A/B examples see conf-sr-policy.conf.
#
# Segment Types:
#   Type C  (3)  - IPv4 Node + SR Algorithm [+ MPLS SID]
#   Type D  (4)  - IPv6 Node + SR Algorithm [+ MPLS SID]
#   Type E  (5)  - IPv4 Node + Local Interface ID [+ MPLS SID]
#   Type F  (6)  - IPv4 Adjacency (local+remote) [+ MPLS SID]
#   Type G  (7)  - IPv6 Link-local Adjacency with Interface IDs [+ MPLS SID]
#   Type H  (8)  - IPv6 Adjacency (local+remote) [+ MPLS SID]
#   Type I  (14) - IPv6 Node + SR Algorithm [+ SRv6 SID [+ Endpoint Behavior]]
#   Type J  (15) - IPv6 Link-local Adjacency + Interface IDs + Algorithm [+ SRv6 SID [+ EB]]
#   Type K  (16) - IPv6 Adjacency + SR Algorithm [+ SRv6 SID [+ Endpoint Behavior]]
# ==============================================================================

neighbor 192.168.100.1 {
	router-id 10.0.0.2;
	local-address 192.168.100.2;
	local-as 65002;
	peer-as 65001;

	family {
		ipv4 sr-policy;
	}

	static {
		# Type C: IPv4 Node + SR Algorithm [+ MPLS SID]
		sr-policy distinguisher 0 color 100 endpoint 10.10.10.10 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-c ipv4 10.0.0.1 algorithm 0 segment type-c ipv4 10.0.0.2 algorithm 0 sid 16001 policy-name "type-c-example";

		# Type D: IPv6 Node + SR Algorithm [+ MPLS SID]
		sr-policy distinguisher 0 color 200 endpoint 10.20.20.20 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-d ipv6 fc00::1 algorithm 0 segment type-d ipv6 fc00::2 algorithm 0 sid 16002 policy-name "type-d-example";

		# Type E: IPv4 Node + Local Interface ID [+ MPLS SID]
		sr-policy distinguisher 0 color 300 endpoint 10.30.30.30 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-e local-if-id 1 ipv4 10.0.0.1 segment type-e local-if-id 2 ipv4 10.0.0.2 sid 16003 policy-name "type-e-example";

		# Type F: IPv4 Adjacency [+ MPLS SID]
		sr-policy distinguisher 0 color 400 endpoint 10.40.40.40 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-f local 192.168.1.1 remote 192.168.1.2 segment type-f local 192.168.2.1 remote 192.168.2.2 sid 16004 policy-name "type-f-example";

		# Type G: IPv6 Link-local Adjacency with Interface IDs [+ MPLS SID]
		sr-policy distinguisher 0 color 500 endpoint 10.50.50.50 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-g local-if-id 1 local-ipv6 fc00::1 remote-if-id 2 remote-ipv6 fc00::2 segment type-g local-if-id 3 local-ipv6 fc00::3 remote-if-id 4 remote-ipv6 fc00::4 sid 16005 policy-name "type-g-example";

		# Type H: IPv6 Adjacency [+ MPLS SID]
		sr-policy distinguisher 0 color 600 endpoint 10.60.60.60 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-h local fc00::1 remote fc00::2 segment type-h local fc00::3 remote fc00::4 sid 16006 policy-name "type-h-example";

		# Type I: IPv6 Node + SR Algorithm [+ SRv6 SID [+ Endpoint Behavior]]
		sr-policy distinguisher 0 color 700 endpoint 10.70.70.70 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-i ipv6 fc00::1 algorithm 0 segment type-i ipv6 fc00::2 algorithm 0 sid fc00::100 segment type-i ipv6 fc00::3 algorithm 0 sid fc00::200 endpoint-behavior 65 32 0 16 0 policy-name "type-i-example";

		# Type J: IPv6 Link-local Adj + Interface IDs + Algorithm [+ SRv6 SID [+ EB]]
		sr-policy distinguisher 0 color 800 endpoint 10.80.80.80 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-j local-if-id 1 local-ipv6 fc00::1 remote-if-id 2 remote-ipv6 fc00::2 algorithm 0 segment type-j local-if-id 3 local-ipv6 fc00::3 remote-if-id 4 remote-ipv6 fc00::4 algorithm 0 sid fc00::300 policy-name "type-j-example";

		# Type K: IPv6 Adjacency + SR Algorithm [+ SRv6 SID [+ Endpoint Behavior]]
		sr-policy distinguisher 0 color 900 endpoint 10.90.90.90 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-k local fc00::1 remote fc00::2 algorithm 0 segment type-k local fc00::3 remote fc00::4 algorithm 0 sid fc00::500 policy-name "type-k-example";

		# Mixed: All MPLS types in one segment list
		sr-policy distinguisher 0 color 1000 endpoint 10.100.100.100 next-hop 192.168.100.2 preference 100 segment-list weight 1 segment type-a mpls 16000 segment type-c ipv4 10.0.0.1 algorithm 0 sid 16001 segment type-f local 192.168.1.1 remote 192.168.1.2 sid 16002 policy-name "mixed-mpls-types";
	}
}
